# AI News Agent — config.yaml
# Bật/tắt nguồn và cấu hình keyword filter

sources:
  github_trending:
    enabled: true
    languages: [python, typescript]
    keywords: [ai, llm, agent, mcp, rag, gpt, llama, claude, openai, gemini]
    max_items: 10

  anthropic:
    enabled: true
    # Lọc bài liên quan AI/engineering (để trống để lấy tất cả)
    keywords: []
    max_items: 20

  security:
    enabled: true
    keywords: [ai, llm, vulnerability, zero-day, ransomware, malware, breach]
    max_items: 5

settings:
  # Cron schedule cho GitHub Actions (UTC)
  cron: "0 1 * * *"
  # Số repo và article đưa vào newsletter
  newsletter_repos: 3
  newsletter_articles: 3
