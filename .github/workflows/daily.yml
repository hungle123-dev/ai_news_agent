name: AI News Daily Delivery

on:
  schedule:
    # Chạy lúc 0:00 AM UTC (7:00 AM giờ Việt Nam GMT+7) mỗi ngày
    - cron: '0 0 * * *'
  
  # Cho phép chạy thủ công từ giao diện GitHub
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: ⚙️ Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 Install dependencies
      run: pip install -r requirements.txt
        
    - name: 💾 Restore seen URLs state
      uses: actions/cache/restore@v4
      with:
        path: ~/.ai-news/seen.json
        key: ai-news-state-
        restore-keys: |
          ai-news-state-
        
    - name: 🚀 Run AI News Agent & Send Digest
      env:
        # LLM APIs — chỉ cần 1 trong 2
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        
        # GitHub (built-in, không cần tạo tay)
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
        # Telegram (bắt buộc)
        ENABLE_TELEGRAM: "true"
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        
        # Discord (tắt mặc định)
        ENABLE_DISCORD: "false"
        
        # Email (tắt mặc định)
        ENABLE_EMAIL: "false"
      
      run: |
        python main.py --send --telegraph
        
    - name: 💾 Save seen URLs state (Prevent duplicates)
      uses: actions/cache/save@v4
      if: always()
      with:
        path: ~/.ai-news/seen.json
        key: ai-news-state-${{ github.run_id }}
