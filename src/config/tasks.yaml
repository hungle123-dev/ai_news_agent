# Cấu hình tasks cho CrewAI
# Mỗi task có: description, expected_output

gather_task:
  description: >
    Thu thập dữ liệu từ TẤT CẢ các tools sau theo thứ tự:
    1. github_trending_ai_repo_tool (limit={repo_limit}) — GitHub repos nổi bật hôm nay
    2. GitHub Trending RSS — backup source từ RSS feed
    3. Anthropic News — tin tức từ Anthropic
    4. Security News — tin bảo mật quan trọng
    5. hacker_news_tool — top tin tức Hacker News về AI
    6. arxiv_tool — các bài nghiên cứu AI/ML mới nhất từ Arxiv
    7. youtube_tool — các video AI mới nhất trên YouTube (rất quan trọng)

    Tổng hợp kết quả vào một ResearchCollection với:
    - generated_at: thời gian hiện tại (ISO 8601)
    - repos: danh sách RepoResearchItem từ GitHub
    - articles: danh sách ArticleResearchItem từ các nguồn còn lại (bao gồm YouTube)

  expected_output: >
    Một ResearchCollection JSON hợp lệ chứa ít nhất:
    - 3-5 repos từ GitHub trending
    - 5-10 articles từ Anthropic và Security News

summarize_task:
  description: >
    Nhận ResearchCollection từ gather_task. Làm các bước sau:
    1. Chọn đúng {repo_limit} repo GitHub có giá trị nhất cho AI developer
    2. Chọn 3-5 articles tin tức đáng quan tâm nhất
    3. Với mỗi mục, tạo:
       - tldr: tóm tắt ngắn gọn 1-2 câu, TẬP TRUNG vào GIÁ TRỊ THỰC TẾ
       - why_it_matters: tại sao developer Việt Nam nên quan tâm
       - highlights: tối đa 3 bullet points kỹ thuật
       - language: (Cho Repo) Ngôn ngữ lập trình chính (vd: Python, TypeScript)
       - stars_today: (Cho Repo) Số lượng sao mới nếu có thể ước lượng
       - source_label: (Cho Article) Nguồn bài (vd: Anthropic, The Hacker News)
    4. Tạo headline và lead paragraph cho toàn bộ bản tin

    Lưu ý: Ưu tiên những repo/tin có thể ứng dụng ngay, không chỉ là research.

  expected_output: >
    Một CuratedNewsletter JSON với:
    - headline: tiêu đề bản tin (tiếng Việt, hấp dẫn)
    - lead: đoạn mở đầu 2-3 câu tóm tắt xu hướng hôm nay
    - repos: list {repo_limit} NewsletterEntry
    - articles: list 3-5 NewsletterEntry

format_task:
  description: >
    Nhận CuratedNewsletter từ summarize_task.
    Render thành HTML cho Telegram với format sau:

    <b>🗞 [Headline]</b>

    [Lead]

    <b>🔥 GitHub Trending</b>
    • <a href="[url]">[Tên repo]</a>
      <i>[TL;DR]</i>
      💡 [Why it matters]
        – [highlight 1]
        – [highlight 2]

    <b>📰 Tin tức</b>
    • <a href="[url]">[Tiêu đề]</a>
      <i>[TL;DR]</i>

    <i>AI News Agent</i>

    Chỉ dùng các tag HTML Telegram hỗ trợ: <b>, <i>, <a href="">, <code>, <pre>
    KHÔNG dùng: <div>, <p>, <span>, <h1>, <ul>, <li>

  expected_output: >
    Một FormattedNewsletter JSON với:
    - title: tiêu đề bản tin (plain text, không có HTML)
    - message_html: HTML hoàn chỉnh đã sẵn sàng gửi Telegram
