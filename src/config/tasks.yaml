# config/tasks.yaml

gather_task:
  description: >
    Hãy dùng đúng các tool được cấp để thu thập dữ liệu thô cho ngày {run_date}.
    1. Gọi tool GitHub để lấy tối đa {repo_limit} repo AI/agentic đang nổi trên GitHub Trending daily.
    2. Gọi tool Anthropic News và Security News để lấy tin mới nhất.
    3. Không tự bịa thêm nguồn ngoài tool.
    4. Giữ lại đầy đủ URL, stars/upvotes, title, summary.
  expected_output: >
    Một object ResearchCollection gồm generated_at và danh sách items; dữ liệu gọn, đúng link, đúng schema.

summarize_task:
  description: >
    Nhận ResearchCollection từ researcher và làm các việc sau:
    1. Chọn đúng {repo_limit} items có tính ứng dụng cao nhất cho dev/builders.
    2. Với mỗi mục, tạo TL;DR ngắn gọn, giải thích vì sao đáng chú ý, và 2-3 highlights.
    3. source_signal phải tận dụng tín hiệu có sẵn, ví dụ "756 stars today".
    4. Viết hoàn toàn bằng tiếng Việt tự nhiên, tránh dịch máy.
    5. headline phải đủ lực để dùng làm title bản tin, lead phải ngắn và đúng trọng tâm.
  expected_output: >
    Một object CuratedNewsletter gồm headline, lead, repos và papers; mỗi entry có title, url, tldr,
    why_it_matters, highlights và source_signal.

format_task:
  description: >
    Nhận CuratedNewsletter và chuyển nó thành message HTML sẵn sàng gửi Telegram.
    Yêu cầu:
    - Output phải là HTML hợp lệ cho Telegram Bot API, không dùng Markdown.
    - headline cần xuất hiện ngay dòng đầu tiên của message_html.
    - Tên repo và paper phải là link click được.
    - Giữ giọng điệu gọn, nhịp đọc tốt trên mobile.
    - Không bịa thêm nội dung ngoài CuratedNewsletter.
  expected_output: >
    Một object FormattedNewsletter gồm title và message_html; message_html phải là HTML hợp lệ cho Telegram.